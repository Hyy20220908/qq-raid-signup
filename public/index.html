<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>副本报名系统</title>
    <link rel="stylesheet" href="/styles.css?v=__ASSET_VERSION__" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <span id="brandLogo" class="brand-mark" aria-hidden="true">
            <span id="brandLogoText">令</span>
            <img id="brandLogoImg" src="" alt="Logo" hidden />
          </span>
          <div>
            <h1 id="brandTitle">团本召集令</h1>
            <p id="brandSubtitle">剑网3 · 副本活动报名</p>
          </div>
        </div>
        <div class="user-area">
          <div id="userBadge" class="user-badge" hidden></div>
          <button id="logoutBtn" class="ghost-button" type="button" hidden>登出</button>
          <button id="adminToggleBtn" class="ghost-button" type="button">后台</button>
        </div>
      </header>

      <main>
        <section id="loginPanel" class="work-section" aria-label="QQ 登录">
          <div class="section-heading">
            <h2>入册</h2>
            <p>QQ 号必填，群名可选。</p>
          </div>
          <form id="loginForm" class="inline-form">
            <label>
              <span>QQ 号</span>
              <input id="qqInput" name="qq" inputmode="numeric" autocomplete="username" placeholder="例如 123456789" required />
            </label>
            <label>
              <span>群名 / 昵称</span>
              <input id="displayNameInput" name="displayName" maxlength="24" autocomplete="nickname" placeholder="可选" />
            </label>
            <button class="primary-button" type="submit">进入报名</button>
          </form>
        </section>

        <section id="activityListSection" class="activity-list-section" aria-label="活动列表">
          <div class="section-heading">
            <div>
              <h2>活动列表</h2>
              <p>选择一张活动卡进入报名名册。</p>
            </div>
            <button id="refreshActivitiesBtn" class="ghost-button" type="button">刷新</button>
          </div>
          <div id="activityCards" class="activity-grid"></div>
          <div id="emptyActivities" class="empty-state" hidden>暂无活动，管理员可以在后台创建。</div>
        </section>

        <section id="adminPanel" class="admin-section" hidden>
          <div class="section-heading">
            <div>
              <h2>掌柜后台</h2>
              <p>管理活动、调整名册。</p>
            </div>
          </div>

          <div class="admin-layout">
            <form id="activityForm" class="admin-form">
              <input id="activityIdInput" type="hidden" />
              <div class="form-title-row">
                <h3 id="activityFormTitle">编辑当前活动</h3>
                <button id="newActivityBtn" class="ghost-button" type="button">新建活动</button>
              </div>
              <label>
                <span>活动标题</span>
                <input id="activityNameInput" maxlength="60" placeholder="例如 周五大战招募" />
              </label>
              <label>
                <span>副本难度</span>
                <select id="difficultyInput">
                  <option value="normal">普通</option>
                  <option value="hero">英雄</option>
                </select>
              </label>
              <label>
                <span>活动类型</span>
                <input id="typeInput" maxlength="40" placeholder="例如 开荒 / farm / 老板团" />
              </label>
              <label>
                <span>创建者</span>
                <input id="creatorNameInput" maxlength="24" placeholder="例如 团长昵称" />
              </label>
              <label>
                <span>创建者 QQ</span>
                <input id="creatorQqInput" inputmode="numeric" maxlength="12" placeholder="可选" />
              </label>
              <label>
                <span>活动时间</span>
                <input id="startTimeInput" type="datetime-local" />
              </label>
              <label>
                <span>结束时间</span>
                <input id="endTimeInput" type="datetime-local" />
              </label>
              <label>
                <span>活动状态</span>
                <select id="statusInput">
                  <option value="active">进行中</option>
                  <option value="ended">结束</option>
                </select>
              </label>
              <div class="count-grid">
                <label>
                  <span>T 位</span>
                  <input id="tankCountInput" type="number" min="0" max="25" value="4" />
                </label>
                <label>
                  <span>奶位</span>
                  <input id="healerCountInput" type="number" min="0" max="25" value="5" />
                </label>
                <label>
                  <span>输出位</span>
                  <input id="dpsCountInput" type="number" min="0" max="25" value="16" />
                </label>
              </div>
              <div class="form-footer">
                <span id="countTotal">合计 25 / 25</span>
                <button id="activitySubmitBtn" class="primary-button" type="submit">保存活动</button>
              </div>
            </form>

            <div class="admin-tools">
              <div class="tool-row">
                <button id="refreshAuditBtn" class="ghost-button" type="button">刷新记录</button>
                <button id="clearActivityBtn" class="ghost-button" type="button">清空报名</button>
                <button id="adminLogoutBtn" class="ghost-button" type="button">退出后台</button>
                <button id="deleteActivityBtn" class="danger-button" type="button">删除当前活动</button>
              </div>
              <div class="audit-list" id="auditList" aria-live="polite"></div>
              <details class="settings-panel">
                <summary class="settings-summary">自定义品牌</summary>
                <div class="settings-form">
                  <div class="setting-section">
                    <span class="setting-label">Logo 图片</span>
                    <p class="setting-hint">上传自定义图片，适配 52×52 区域</p>
                    <div class="logo-upload-row">
                      <input id="settingsLogoFile" type="file" accept="image/png,image/jpeg,image/gif,image/webp" />
                      <button id="uploadLogoBtn" class="primary-button" type="button">上传</button>
                    </div>
                    <div id="logoPreview" class="logo-preview" hidden>
                      <img id="logoPreviewImg" src="" alt="Logo 预览" />
                      <button id="removeLogoBtn" class="danger-button" type="button">移除图片</button>
                    </div>
                  </div>
                  <label>
                    <span>品牌标题</span>
                    <input id="settingsBrandTitle" maxlength="40" placeholder="团本召集令" />
                  </label>
                  <label>
                    <span>副标题</span>
                    <input id="settingsBrandSubtitle" maxlength="80" placeholder="剑网3 · 副本活动报名" />
                  </label>
                  <label>
                    <span>背景色（十六进制）</span>
                    <div class="color-row">
                      <input id="settingsBgColor" maxlength="7" placeholder="#2a211b" />
                      <span id="bgColorPreview" class="color-preview"></span>
                    </div>
                  </label>
                  <button id="saveSettingsBtn" class="primary-button" type="button">保存设置</button>
                </div>
              </details>
              <details class="settings-panel">
                <summary class="settings-summary">修改管理员密码</summary>
                <form id="adminPasswordForm" class="password-form">
                  <label>
                    <span>当前密码</span>
                    <input id="currentAdminPasswordInput" type="password" autocomplete="current-password" required />
                  </label>
                  <label>
                    <span>新密码</span>
                    <input id="newAdminPasswordInput" type="password" autocomplete="new-password" minlength="6" required />
                  </label>
                  <label>
                    <span>确认新密码</span>
                    <input id="confirmAdminPasswordInput" type="password" autocomplete="new-password" minlength="6" required />
                  </label>
                  <button id="saveAdminPasswordBtn" class="primary-button" type="submit">保存新密码</button>
                </form>
              </details>
            </div>
          </div>
        </section>

        <div id="detailPanel" class="detail-panel">
          <section class="summary-band" aria-label="活动概览">
            <div class="summary-main">
              <div class="status-line">
                <span id="statusPill" class="status-pill">进行中</span>
                <span id="timeRange">时间待定</span>
              </div>
              <h2 id="activityTitle">25人副本报名</h2>
              <p id="activityMeta">普通 · 创建者 管理员</p>
            </div>
            <div class="summary-stats" id="summaryStats"></div>
          </section>

          <section class="board-section" aria-label="报名位置">
            <div class="section-heading board-heading">
              <div>
                <h2>团队名册</h2>
                <p id="boardHint">登录后选择空位填写报名信息。</p>
              </div>
              <div class="tool-row compact-tools">
                <button id="backToListBtn" class="ghost-button" type="button">返回列表</button>
                <button id="refreshBtn" class="ghost-button" type="button">刷新名册</button>
              </div>
            </div>
            <div id="board" class="board"></div>
          </section>
        </div>
      </main>
    </div>

    <dialog id="signupDialog" class="dialog">
      <form id="signupForm" method="dialog">
        <div class="dialog-head">
          <div>
            <span id="dialogRole" class="dialog-kicker"></span>
            <h2 id="dialogTitle">填写报名</h2>
          </div>
          <button id="closeDialogBtn" class="icon-button" value="cancel" type="button" aria-label="关闭">×</button>
        </div>
        <input id="slotIdInput" type="hidden" />
        <label>
          <span>QQ 号</span>
          <input id="dialogQqInput" disabled />
        </label>
        <div id="bossToggleField" class="boss-toggle-row">
          <label class="boss-toggle-label" for="isBossInput">
            <span class="boss-toggle-icon">👑</span>
            <span class="boss-toggle-text">我是老板</span>
            <span class="boss-toggle-hint">老板可自由选择任意职业心法</span>
          </label>
          <input id="isBossInput" type="checkbox" class="boss-checkbox" />
        </div>
        <label id="specField">
          <span>心法</span>
          <select id="specInput"></select>
        </label>
        <label>
          <span>游戏 ID</span>
          <input id="signupIdInput" maxlength="40" required />
        </label>
        <label id="buffField">
          <span>增益层数</span>
          <input id="buffStacksInput" type="number" min="0" max="999" />
        </label>
        <label id="gearField">
          <span>装分</span>
          <input id="gearScoreInput" type="number" min="0" max="999999" />
        </label>
        <label id="noteField">
          <span>备注</span>
          <input id="noteInput" maxlength="80" placeholder="可选" />
        </label>
        <div class="dialog-actions">
          <button id="deleteSignupBtn" class="danger-button" type="button" hidden>撤销报名</button>
          <button id="signupSubmitBtn" class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="adminDialog" class="dialog small-dialog">
      <form id="adminLoginForm" method="dialog">
        <div class="dialog-head">
          <div>
            <span class="dialog-kicker">Admin</span>
            <h2>管理员登录</h2>
          </div>
          <button id="closeAdminDialogBtn" class="icon-button" value="cancel" type="button" aria-label="关闭">×</button>
        </div>
        <label>
          <span>管理员密码</span>
          <input id="adminPasswordInput" type="password" autocomplete="current-password" required />
        </label>
        <div class="dialog-actions">
          <button class="primary-button" type="submit">进入后台</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" hidden></div>
    <script src="/app.js?v=__ASSET_VERSION__" defer></script>
  </body>
</html>
